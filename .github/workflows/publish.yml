name: Publish to npm

permissions: {}

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Use Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint code
        run: pnpm lint:src

      - name: Lint types
        run: pnpm lint:types

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Lint exports (attw)
        run: pnpm lint:exports

      - name: Lint publish (publint)
        run: pnpm lint:publish

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tarball: ${{ steps.pack.outputs.tarball }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Use Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm build

      - name: Align package.json version with release tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: npm version "$TAG_NAME" --git-tag-version=false --allow-same-version

      - name: Pack tarball
        id: pack
        run: |
          TARBALL=$(npm pack --ignore-scripts)
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tarball
          path: ${{ steps.pack.outputs.tarball }}

  publish:
    needs:
      - test
      - build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: publish
    env:
      TARBALL: ${{ needs.build.outputs.tarball }}
    steps:
      - name: Download tarball artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: tarball

      - name: Use Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        env:
          PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [ "$PRERELEASE" = "true" ]; then
            npm publish --provenance --access public --tag next "$TARBALL"
          else
            npm publish --provenance --access public "$TARBALL"
          fi
